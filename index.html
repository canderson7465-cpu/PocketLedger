<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Pocket Ledger</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Ledger">
<meta name="theme-color" content="#232A24">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --paper:#EDEFE9;
    --paper-2:#E2E6DA;
    --card:#F6F7F2;
    --ink:#232A24;
    --slate:#6B7268;
    --moss:#4B6B58;
    --moss-light:#DCE6DE;
    --gold:#B98A2E;
    --gold-light:#F3E6C6;
    --rust:#A6552D;
    --rust-light:#F0DDC9;
    --alert:#A13D3D;
    --alert-light:#F3DCDA;
    --line:#CBCFC1;
    --radius:16px;
    --font-display: ui-rounded, 'Segoe UI', -apple-system, system-ui, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  @media (prefers-reduced-motion:no-preference){
    .animate{ transition: all .18s ease; }
  }

  /* ---------- Top bar ---------- */
  header.topbar{
    padding:22px 20px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  header.topbar .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    letter-spacing:-0.01em;
  }
  header.topbar .brand span{color:var(--gold);}
  header.topbar .week-label{
    font-size:13px;
    color:var(--slate);
    font-weight:500;
  }

  main{
    flex:1;
    padding:0 16px 100px;
    overflow-y:auto;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .card h2{
    font-family:var(--font-display);
    font-size:15px;
    font-weight:600;
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2 .step{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;height:20px;
    border-radius:6px;
    background:var(--paper-2);
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:700;
    color:var(--slate);
  }
  .subtext{color:var(--slate); font-size:13px; line-height:1.5; margin:0 0 12px;}

  /* ---------- Hero (Home) ---------- */
  .hero{
    background:var(--ink);
    color:var(--paper);
    border-radius:20px;
    padding:22px 20px 18px;
    margin-bottom:16px;
  }
  .hero .hero-label{
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#AEB6A6;
    font-weight:600;
  }
  .hero .hero-amount{
    font-family:var(--font-mono);
    font-size:44px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:4px 0 14px;
  }
  .hero .hero-amount.neg{color:#E29A93;}
  .ledger-strip{
    display:flex;
    height:10px;
    border-radius:6px;
    overflow:hidden;
    background:#3A423A;
    margin-bottom:8px;
  }
  .ledger-strip .seg{height:100%;}
  .ledger-strip .seg.bills{background:var(--rust);}
  .ledger-strip .seg.savings{background:var(--moss);}
  .ledger-strip .seg.left{background:var(--gold);}
  .ledger-key{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:11.5px;
    color:#C7CDC0;
  }
  .ledger-key .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
  .ledger-key .bills .dot{background:var(--rust);}
  .ledger-key .savings .dot{background:var(--moss);}
  .ledger-key .left .dot{background:var(--gold);}

  /* ---------- Hours stepper ---------- */
  .stepper-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .stepper-btn{
    width:46px;height:46px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--paper-2);
    font-size:20px;
    font-weight:700;
    color:var(--ink);
    font-family:var(--font-mono);
    cursor:pointer;
  }
  .stepper-btn:active{background:var(--line);}
  .stepper-value{
    flex:1;
    text-align:center;
    font-family:var(--font-mono);
    font-size:26px;
    font-weight:700;
  }
  .stepper-value small{display:block;font-family:var(--font-body);font-weight:500;font-size:11px;color:var(--slate);}
  .chip-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .chip{
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--card);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
  }
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .pay-breakdown{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--slate);
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--line);
  }
  .pay-breakdown b{color:var(--ink); font-family:var(--font-mono);}

  /* ---------- List rows (bills / envelopes) ---------- */
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:none;}
  .check{
    width:24px;height:24px;
    border-radius:8px;
    border:2px solid var(--line);
    background:var(--card);
    flex-shrink:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .check.on{background:var(--moss); border-color:var(--moss);}
  .check.on::after{content:"✓"; color:#fff; font-size:14px; font-weight:700;}
  .row .name{flex:1; font-weight:600; font-size:14.5px;}
  .row .name small{display:block; font-weight:400; color:var(--slate); font-size:11.5px; margin-top:1px;}
  .row .amt-input{
    width:78px;
    text-align:right;
    font-family:var(--font-mono);
    font-size:14.5px;
    font-weight:600;
    border:1px solid var(--line);
    border-radius:8px;
    padding:7px 8px;
    background:#fff;
    color:var(--ink);
  }
  .tag{
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.03em;
    padding:3px 7px;
    border-radius:6px;
  }
  .tag.fixed{background:var(--moss-light); color:var(--moss);}
  .tag.variable{background:var(--gold-light); color:var(--gold);}

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:14px 18px;
    border-radius:12px;
    border:none;
    font-family:var(--font-body);
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .btn.primary{background:var(--ink); color:var(--paper);}
  .btn.ghost{background:var(--paper-2); color:var(--ink);}
  .btn.danger{background:var(--alert-light); color:var(--alert);}
  .btn.small{width:auto; padding:9px 14px; font-size:13px; border-radius:10px;}

  /* ---------- Envelopes ---------- */
  .env-group-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:14px;
    margin:20px 0 10px 4px;
    display:flex;
    justify-content:space-between;
    color:var(--slate);
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .env-group-title b{color:var(--ink); font-family:var(--font-mono); text-transform:none; letter-spacing:0;}
  .envelope{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .envelope .flap{
    height:8px;
    background:linear-gradient(120deg, var(--moss), var(--gold));
  }
  .envelope .body{padding:14px 16px;}
  .envelope .top-row{display:flex; justify-content:space-between; align-items:baseline;}
  .envelope .ename{font-weight:700; font-size:14.5px;}
  .envelope .ebal{font-family:var(--font-mono); font-weight:700; font-size:17px;}
  .envelope .etarget{font-size:11.5px; color:var(--slate); margin-top:2px;}
  .envelope .actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .envelope .actions .chip{padding:7px 12px; font-size:12.5px;}
  .envelope .actions .chip.minus{color:var(--rust);}

  /* ---------- Bills edit ---------- */
  .bill-edit-row{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
  }
  .bill-edit-row .fields{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .field{display:flex; flex-direction:column; gap:4px; flex:1; min-width:100px;}
  .field label{font-size:11px; color:var(--slate); font-weight:600;}
  .field input, .field select{
    border:1px solid var(--line);
    border-radius:9px;
    padding:9px 10px;
    font-size:14px;
    font-family:var(--font-body);
    background:#fff;
    color:var(--ink);
  }
  .field input[type=number]{font-family:var(--font-mono);}
  .row-top{display:flex; justify-content:space-between; align-items:center;}
  .icon-btn{
    width:34px;height:34px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--slate);
  }

  /* ---------- Nav ---------- */
  nav.tabbar{
    position:sticky;
    bottom:0;
    left:0; right:0;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    max-width:480px;
    margin:0 auto;
    width:100%;
  }
  nav.tabbar button{
    flex:1;
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding:8px 4px;
    border-radius:12px;
    cursor:pointer;
    color:var(--slate);
    font-family:var(--font-body);
    font-size:11px;
    font-weight:600;
  }
  nav.tabbar button.active{color:var(--moss); background:var(--moss-light);}
  nav.tabbar svg{width:22px;height:22px;}

  .empty{
    text-align:center;
    padding:30px 10px;
    color:var(--slate);
    font-size:13.5px;
  }
  .welcome{
    background:var(--gold-light);
    border:1px solid var(--gold);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:14px;
  }
  .welcome h2{color:var(--gold); margin-bottom:6px;}
  .welcome p{font-size:13.5px; line-height:1.55; margin:0 0 10px; color:#5C4A22;}
  .welcome ol{margin:0 0 12px; padding-left:18px; font-size:13.5px; color:#5C4A22; line-height:1.7;}
  .toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:var(--paper);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    opacity:0;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{opacity:1; animation:toastpop .18s ease;}
  @keyframes toastpop{from{transform:translateX(-50%) translateY(6px); opacity:0;} to{transform:translateX(-50%) translateY(0); opacity:1;}}

  .history-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px;}
  .history-row:last-child{border-bottom:none;}
  .history-row .d{color:var(--slate); font-size:11.5px;}
  .history-row .amt{font-family:var(--font-mono); font-weight:700;}
  .history-row .amt.neg{color:var(--alert);}
  .history-row .amt.pos{color:var(--moss);}

  .settings-label{font-size:13px; font-weight:600; margin-bottom:6px; display:block;}
  .settings-row{margin-bottom:16px;}
  .settings-row input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    font-family:var(--font-mono);
    background:#fff;
  }
  .help-text{font-size:12px; color:var(--slate); margin-top:5px; line-height:1.5;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">Pocket <span>Ledger</span></div>
    <div class="week-label" id="weekLabel"></div>
  </header>
  <main id="view"></main>
  <div class="toast" id="toast"></div>
  <nav class="tabbar" id="tabbar"></nav>
</div>

<script>
/* ============================================================
   POCKET LEDGER — a phone-friendly weekly budget + savings-envelope
   tool. All data is autosaved on-device (localStorage) as it changes —
   nothing is ever sent over the network.
   ============================================================ */

const ICONS = {
  home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>',
  env:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 6 9 7 9-7"/></svg>',
  bills:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>'
};

const DEFAULT_DATA = {
  profile: { hourlyRate: 23.10, deductionRate: 0.373, name: "Ben" },
  bills: [
    { id:'rent', name:'Rent', amount:796, day:'1st', type:'fixed' },
    { id:'car_payment', name:'Car Payment', amount:190, day:'13th', type:'fixed' },
    { id:'car_ins', name:'Car Insurance', amount:165, day:'9th', type:'fixed' },
    { id:'renters_ins', name:"Renter's Insurance", amount:17, day:'Nov (annual)', type:'fixed' },
    { id:'electric', name:'Electric', amount:145, day:'15th', type:'variable' },
    { id:'internet', name:'Internet', amount:98, day:'15th', type:'fixed' },
    { id:'phone', name:'Phone', amount:35, day:'15th', type:'fixed' },
    { id:'fuel', name:'Fuel', amount:65, day:'—', type:'variable' },
    { id:'food', name:'Food', amount:563, day:'—', type:'variable' },
    { id:'clothes', name:'Clothes', amount:20, day:'—', type:'variable' },
    { id:'car_maint', name:'Car Reg, Maint & Tires', amount:110, day:'—', type:'fixed' },
    { id:'credit_card', name:'Credit Card', amount:40, day:'8th', type:'variable' },
    { id:'subscriptions', name:'Subscriptions', amount:39, day:'1st/6th/11th', type:'fixed' },
    { id:'gaming', name:'Gaming / Discretionary', amount:0, day:'—', type:'variable' }
  ],
  envelopes: [
    { id:'e_maint', group:'Car', name:'Maintenance', balance:983, monthlyTarget:70 },
    { id:'e_reg', group:'Car', name:'Registration', balance:312, monthlyTarget:20 },
    { id:'e_tires', group:'Car', name:'Tires', balance:226, monthlyTarget:20 },
    { id:'e_carins', group:'Car', name:'Insurance buffer', balance:160, monthlyTarget:0 },
    { id:'e_household', group:'General', name:'Household Supplies', balance:0, monthlyTarget:15 },
    { id:'e_move', group:'General', name:'Moving', balance:100, monthlyTarget:0 },
    { id:'e_clothes', group:'General', name:'Clothes', balance:310, monthlyTarget:20 },
    { id:'e_misc', group:'General', name:'Misc', balance:175, monthlyTarget:0 },
    { id:'e_health', group:'General', name:'Healthcare', balance:1130, monthlyTarget:25 },
    { id:'e_buffer', group:'General', name:'Short-check buffer', balance:462, monthlyTarget:0 },
    { id:'e_emergency', group:'General', name:'Emergency', balance:1718, monthlyTarget:50 },
    { id:'e_inherit', group:'General', name:'Inheritance', balance:4550, monthlyTarget:0 }
  ],
  week: { startDate: todayISO(), hours:40, vtoLabel:'Full week', billsChecked:{}, billOverride:{}, envDeposits:{} },
  history: [],
  onboardingSeen:false
};

let DATA = null;
let TAB = 'home';
let saveTimer = null;

function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmt(n){
  const neg = n < 0;
  const v = Math.abs(Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg?'-$':'$') + v;
}
function fmtWhole(n){ return '$' + Math.round(n).toLocaleString('en-US'); }
function weeklyFromMonthly(m){ return m * 12 / 52; }

/* ---------------- Storage ----------------
   Everything is saved with localStorage, which keeps data only on THIS
   device, in THIS browser/app instance — nothing is sent anywhere, no
   account or internet connection required. This is what makes the app
   safe to install and use fully offline. */
const STORAGE_KEY = 'pocket-ledger-data-v1';
async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      DATA = Object.assign({}, DEFAULT_DATA, parsed);
    } else {
      DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e){
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}
function saveData(showToast){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      if(showToast) flashToast('Saved');
    }catch(e){ console.error('Storage error', e); flashToast('Could not save — storage may be full or blocked'); }
  }, 200);
}
function flashToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}

/* ---------------- Derived calculations ---------------- */
function netPay(){
  const gross = DATA.week.hours * DATA.profile.hourlyRate;
  return gross * (1 - DATA.profile.deductionRate);
}
function billsAllocatedTotal(){
  let sum = 0;
  DATA.bills.forEach(b=>{
    if(DATA.week.billsChecked[b.id]){
      const amt = (DATA.week.billOverride[b.id] !== undefined) ? DATA.week.billOverride[b.id] : weeklyFromMonthly(b.amount);
      sum += amt;
    }
  });
  return sum;
}
function savingsAllocatedTotal(){
  let sum = 0;
  Object.values(DATA.week.envDeposits).forEach(v=> sum += v);
  return sum;
}
function leftToSpend(){
  return netPay() - billsAllocatedTotal() - savingsAllocatedTotal();
}

/* ---------------- Render root ---------------- */
function render(){
  document.getElementById('weekLabel').textContent = 'Week of ' + new Date(DATA.week.startDate+'T00:00:00').toLocaleDateString('en-US',{month:'short', day:'numeric'});
  renderTabbar();
  const view = document.getElementById('view');
  if(TAB==='home') view.innerHTML = renderHome();
  else if(TAB==='env') view.innerHTML = renderEnvelopes();
  else if(TAB==='bills') view.innerHTML = renderBills();
  else if(TAB==='settings') view.innerHTML = renderSettings();
}
function renderTabbar(){
  const tabs = [
    {id:'home', label:'This Week', icon:ICONS.home},
    {id:'env', label:'Envelopes', icon:ICONS.env},
    {id:'bills', label:'Bills', icon:ICONS.bills},
    {id:'settings', label:'Settings', icon:ICONS.gear}
  ];
  document.getElementById('tabbar').innerHTML = tabs.map(t=>
    `<button class="${TAB===t.id?'active':''}" onclick="setTab('${t.id}')">${t.icon}<span>${t.label}</span></button>`
  ).join('');
}
function setTab(id){ TAB = id; render(); }

/* ---------------- HOME ---------------- */
function renderHome(){
  const net = netPay();
  const billsT = billsAllocatedTotal();
  const savT = savingsAllocatedTotal();
  const left = leftToSpend();
  const total = Math.max(net, billsT+savT+Math.max(left,0), 1);
  const billsPct = Math.max(0, billsT/total*100);
  const savPct = Math.max(0, savT/total*100);
  const leftPct = Math.max(0, Math.min(100-billsPct-savPct, (left>0? left/total*100 : 0)));

  let onboarding = '';
  if(!DATA.onboardingSeen){
    onboarding = `
    <div class="welcome">
      <h2>👋 Welcome to Pocket Ledger</h2>
      <p>Three steps every week:</p>
      <ol>
        <li>Enter hours worked this week</li>
        <li>Check off bills as you set money aside</li>
        <li>Drop a little into savings envelopes</li>
      </ol>
      <p style="margin-bottom:0">Whatever's left over is safe to spend. Tap <b>Finish week</b> when you're done to lock it in and start fresh.</p>
      <button class="btn ghost small" onclick="dismissOnboarding()">Got it</button>
    </div>`;
  }

  return `
    ${onboarding}
    <div class="hero">
      <div class="hero-label">Left to spend this week</div>
      <div class="hero-amount ${left<0?'neg':''}">${fmt(left)}</div>
      <div class="ledger-strip">
        <div class="seg bills" style="width:${billsPct}%"></div>
        <div class="seg savings" style="width:${savPct}%"></div>
        <div class="seg left" style="width:${leftPct}%"></div>
      </div>
      <div class="ledger-key">
        <span class="bills"><span class="dot"></span>Bills ${fmtWhole(billsT)}</span>
        <span class="savings"><span class="dot"></span>Saved ${fmtWhole(savT)}</span>
        <span class="left"><span class="dot"></span>Free ${fmtWhole(Math.max(left,0))}</span>
      </div>
    </div>

    <div class="card">
      <h2><span class="step">1</span> Hours worked this week</h2>
      <div class="chip-row">
        ${[0,20,32,40].map(h=>`<div class="chip ${DATA.week.hours===h?'active':''}" onclick="setHours(${h})">${h===0?'Off':h+' hrs'}</div>`).join('')}
      </div>
      <div class="stepper-row">
        <button class="stepper-btn" onclick="bumpHours(-4)">−</button>
        <div class="stepper-value">${DATA.week.hours}<small>hours</small></div>
        <button class="stepper-btn" onclick="bumpHours(4)">+</button>
      </div>
      <div class="pay-breakdown">
        <span>Gross: <b>${fmt(DATA.week.hours*DATA.profile.hourlyRate)}</b></span>
        <span>Take-home: <b>${fmt(net)}</b></span>
      </div>
    </div>

    <div class="card">
      <h2><span class="step">2</span> Set money aside for bills</h2>
      <p class="subtext">Check a bill once you've set its weekly share aside. Tap the amount to adjust it.</p>
      ${DATA.bills.map(b=>{
        const weekly = (DATA.week.billOverride[b.id]!==undefined)? DATA.week.billOverride[b.id] : weeklyFromMonthly(b.amount);
        const on = !!DATA.week.billsChecked[b.id];
        return `<div class="row">
          <div class="check ${on?'on':''}" onclick="toggleBill('${b.id}')"></div>
          <div class="name">${b.name}<small>${fmtWhole(b.amount)}/mo · due ${b.day}</small></div>
          <input class="amt-input" type="number" step="1" value="${weekly.toFixed(0)}" onchange="setBillOverride('${b.id}', this.value)">
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <h2><span class="step">3</span> Add to savings envelopes</h2>
      <p class="subtext">A few dollars now keeps the big goals — car repairs, healthcare, emergencies — from becoming a crisis later.</p>
      ${DATA.envelopes.filter(e=>e.monthlyTarget>0).map(e=>{
        const suggested = Math.round(weeklyFromMonthly(e.monthlyTarget));
        const added = DATA.week.envDeposits[e.id] || 0;
        return `<div class="row">
          <div class="name">${e.name}<small>${added>0? 'Added '+fmtWhole(added)+' this week' : 'Suggested '+fmtWhole(suggested)+'/wk'}</small></div>
          ${added>0
            ? `<button class="btn ghost small" onclick="undoDeposit('${e.id}', ${added})">Undo</button>`
            : `<button class="btn primary small" onclick="quickDeposit('${e.id}', ${suggested})">+ ${fmtWhole(suggested)}</button>`}
        </div>`;
      }).join('')}
    </div>

    <button class="btn primary" onclick="finishWeek()">Finish week & start new</button>
  `;
}
function dismissOnboarding(){ DATA.onboardingSeen = true; saveData(); render(); }
function setHours(h){ DATA.week.hours = h; saveData(); render(); }
function bumpHours(delta){ DATA.week.hours = Math.max(0, Math.min(60, DATA.week.hours+delta)); saveData(); render(); }
function toggleBill(id){
  DATA.week.billsChecked[id] = !DATA.week.billsChecked[id];
  saveData(); render();
}
function setBillOverride(id, val){
  const n = parseFloat(val);
  if(!isNaN(n)) DATA.week.billOverride[id] = n;
  saveData(); render();
}
function quickDeposit(envId, amount){
  const env = DATA.envelopes.find(e=>e.id===envId);
  if(!env) return;
  env.balance += amount;
  DATA.week.envDeposits[envId] = (DATA.week.envDeposits[envId]||0) + amount;
  saveData(); render();
  flashToast('Added '+fmtWhole(amount)+' to '+env.name);
}
function undoDeposit(envId, amount){
  const env = DATA.envelopes.find(e=>e.id===envId);
  if(!env) return;
  env.balance -= amount;
  delete DATA.week.envDeposits[envId];
  saveData(); render();
}
function finishWeek(){
  const summary = {
    startDate: DATA.week.startDate,
    hours: DATA.week.hours,
    net: netPay(),
    bills: billsAllocatedTotal(),
    saved: savingsAllocatedTotal(),
    left: leftToSpend()
  };
  DATA.history.unshift(summary);
  DATA.history = DATA.history.slice(0, 52);
  DATA.week = { startDate: todayISO(), hours: DATA.week.hours, vtoLabel:'', billsChecked:{}, billOverride:{}, envDeposits:{} };
  saveData();
  render();
  flashToast('Week saved — fresh start!');
}

/* ---------------- ENVELOPES ---------------- */
function renderEnvelopes(){
  const groups = ['Car','General'];
  return groups.map(g=>{
    const items = DATA.envelopes.filter(e=>e.group===g);
    const total = items.reduce((s,e)=>s+e.balance,0);
    return `
      <div class="env-group-title">${g} envelopes <b>${fmtWhole(total)}</b></div>
      ${items.map(e=>`
        <div class="envelope">
          <div class="flap"></div>
          <div class="body">
            <div class="top-row">
              <div class="ename">${e.name}</div>
              <div class="ebal">${fmt(e.balance)}</div>
            </div>
            <div class="etarget">${e.monthlyTarget>0? 'Goal: '+fmtWhole(e.monthlyTarget)+'/mo' : 'No monthly goal set'}</div>
            <div class="actions">
              <div class="chip" onclick="envMove('${e.id}', 5)">+$5</div>
              <div class="chip" onclick="envMove('${e.id}', 20)">+$20</div>
              <div class="chip" onclick="envMove('${e.id}', 50)">+$50</div>
              <div class="chip" onclick="envCustom('${e.id}')">+Custom</div>
              <div class="chip minus" onclick="envCustom('${e.id}', true)">− Spend from this</div>
            </div>
          </div>
        </div>
      `).join('')}
    `;
  }).join('');
}
function envMove(id, amount){
  const env = DATA.envelopes.find(e=>e.id===id);
  if(!env) return;
  env.balance += amount;
  saveData(); render();
  flashToast('Added '+fmtWhole(amount)+' to '+env.name);
}
function envCustom(id, subtract){
  const env = DATA.envelopes.find(e=>e.id===id);
  if(!env) return;
  const raw = prompt((subtract? 'Spend how much from ' : 'Add how much to ')+env.name+'?');
  const n = parseFloat(raw);
  if(isNaN(n) || n<=0) return;
  env.balance += subtract? -n : n;
  saveData(); render();
}

/* ---------------- BILLS ---------------- */
function renderBills(){
  return `
    <div class="card">
      <h2>Recurring bills</h2>
      <p class="subtext">Edit an amount the moment it changes — like a higher electric bill in summer. Weekly checklist amounts update automatically.</p>
    </div>
    ${DATA.bills.map(b=>`
      <div class="bill-edit-row">
        <div class="row-top">
          <input value="${b.name}" style="border:none;background:none;font-weight:700;font-size:15px;font-family:inherit;flex:1;padding:0;" onchange="editBill('${b.id}','name',this.value)">
          <button class="icon-btn" onclick="removeBill('${b.id}')">${ICONS.trash}</button>
        </div>
        <div class="fields">
          <div class="field">
            <label>Monthly $</label>
            <input type="number" value="${b.amount}" onchange="editBill('${b.id}','amount',this.value)">
          </div>
          <div class="field">
            <label>Due</label>
            <input value="${b.day}" onchange="editBill('${b.id}','day',this.value)">
          </div>
          <div class="field">
            <label>Type</label>
            <select onchange="editBill('${b.id}','type',this.value)">
              <option value="fixed" ${b.type==='fixed'?'selected':''}>Fixed</option>
              <option value="variable" ${b.type==='variable'?'selected':''}>Variable</option>
            </select>
          </div>
        </div>
      </div>
    `).join('')}
    <button class="btn ghost" onclick="addBill()">${ICONS.plus} Add a bill</button>
  `;
}
function editBill(id, field, value){
  const b = DATA.bills.find(x=>x.id===id);
  if(!b) return;
  b[field] = (field==='amount') ? (parseFloat(value)||0) : value;
  saveData(); render();
}
function removeBill(id){
  if(!confirm('Remove this bill?')) return;
  DATA.bills = DATA.bills.filter(b=>b.id!==id);
  saveData(); render();
}
function addBill(){
  const id = 'b_'+Date.now();
  DATA.bills.push({id, name:'New bill', amount:0, day:'—', type:'variable'});
  saveData(); render();
}

/* ---------------- SETTINGS ---------------- */
function renderSettings(){
  const hist = DATA.history;
  return `
    <div class="card">
      <h2>Pay settings</h2>
      <div class="settings-row">
        <span class="settings-label">Hourly rate</span>
        <input type="number" step="0.01" value="${DATA.profile.hourlyRate}" onchange="setProfile('hourlyRate', this.value)">
      </div>
      <div class="settings-row" style="margin-bottom:0">
        <span class="settings-label">Deductions (taxes, insurance, 401k)</span>
        <input type="number" step="1" value="${Math.round(DATA.profile.deductionRate*100)}" onchange="setProfile('deductionRate', this.value/100)">
        <div class="help-text">Currently ${Math.round(DATA.profile.deductionRate*100)}% comes out of every paycheck before it hits the bank.</div>
      </div>
    </div>

    <div class="card">
      <h2>Week history</h2>
      ${hist.length===0? '<div class="empty">No finished weeks yet — tap "Finish week" on the Home tab once you\'ve logged one.</div>' :
        hist.map(h=>`
          <div class="history-row">
            <div>
              <div>${new Date(h.startDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
              <div class="d">${h.hours} hrs · ${fmtWhole(h.bills)} bills · ${fmtWhole(h.saved)} saved</div>
            </div>
            <div class="amt ${h.left<0?'neg':'pos'}">${fmt(h.left)}</div>
          </div>
        `).join('')
      }
    </div>

    <div class="card">
      <h2>Sync phone &amp; PC</h2>
      <p class="subtext">No internet involved — this just turns your data into a short code you copy from one device and paste into the other. Whichever code you load becomes the new copy on that device, so load the newest one.</p>
      <button class="btn ghost small" onclick="showExportCode()">Get code from this device</button>
      <textarea id="exportBox" readonly style="display:none; width:100%; margin-top:10px; font-family:var(--font-mono); font-size:11px; border-radius:10px; border:1px solid var(--line); padding:10px; height:64px; color:var(--ink);"></textarea>
      <div style="height:16px"></div>
      <span class="settings-label">Paste a code from another device</span>
      <textarea id="importBox" placeholder="Paste code here" style="width:100%; font-family:var(--font-mono); font-size:11px; border-radius:10px; border:1px solid var(--line); padding:10px; height:64px; color:var(--ink);"></textarea>
      <button class="btn primary small" style="margin-top:10px" onclick="doImport()">Load this code</button>
    </div>

    <div class="card">
      <h2>Backup</h2>
      <p class="subtext">A sync code only helps if the OTHER device still exists. This sends a copy somewhere safe, in case a phone is ever lost, stolen, or breaks before it can be synced.</p>
      <button class="btn ghost small" onclick="emailBackup()">Email this code to yourself</button>
      <div class="help-text" style="margin-top:10px">${DATA.lastExportAt ? 'Last backup: '+new Date(DATA.lastExportAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'No backup made yet — worth doing once envelope balances start adding up.'}</div>
    </div>

    <div class="card">
      <h2>Start over</h2>
      <p class="subtext">This clears every bill, envelope, and week of history and cannot be undone.</p>
      <button class="btn danger" onclick="resetAll()">Reset all data</button>
    </div>
  `;
}
function setProfile(field, value){
  DATA.profile[field] = parseFloat(value)||0;
  saveData(); render();
}
function resetAll(){
  if(!confirm('This clears everything and cannot be undone. Continue?')) return;
  DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(); render();
}

/* ---------------- Sync (copy/paste code, no network) ---------------- */
function exportCode(){
  DATA.lastExportAt = new Date().toISOString();
  const json = JSON.stringify(DATA);
  saveData();
  return btoa(unescape(encodeURIComponent(json)));
}
function showExportCode(){
  const box = document.getElementById('exportBox');
  box.style.display = 'block';
  box.value = exportCode();
  box.focus();
  box.select();
  try{
    document.execCommand('copy');
    flashToast('Code copied — paste it on the other device');
  }catch(e){
    flashToast('Code ready below — copy it manually');
  }
}
function doImport(){
  const raw = document.getElementById('importBox').value.trim();
  if(!raw){ flashToast('Paste a code first'); return; }
  let parsed = null;
  try{
    const json = decodeURIComponent(escape(atob(raw)));
    parsed = JSON.parse(json);
  }catch(e){ parsed = null; }
  if(!parsed || !parsed.bills){ flashToast("That code didn't work — make sure it was copied in full"); return; }
  if(!confirm('This replaces everything on this device with the pasted data. Continue?')) return;
  DATA = Object.assign({}, DEFAULT_DATA, parsed);
  saveData();
  render();
  flashToast('Synced!');
}
function emailBackup(){
  const code = exportCode();
  const subject = encodeURIComponent('Pocket Ledger backup — ' + new Date().toLocaleDateString());
  const body = encodeURIComponent(
    "This is a backup code from Pocket Ledger. To restore it, open the app, go to Settings, "
    + "paste this whole code into \"Paste a code from another device,\" and tap \"Load this code.\"\n\n"
    + code
  );
  window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
  render();
}

/* ---------------- Boot ---------------- */
(async function init(){
  await loadData();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
