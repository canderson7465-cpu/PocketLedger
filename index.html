<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Pocket Ledger</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Ledger">
<meta name="theme-color" content="#232A24">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --paper:#EDEFE9;
    --paper-2:#E2E6DA;
    --card:#F6F7F2;
    --ink:#232A24;
    --slate:#6B7268;
    --moss:#4B6B58;
    --moss-light:#DCE6DE;
    --gold:#B98A2E;
    --gold-light:#F3E6C6;
    --rust:#A6552D;
    --rust-light:#F0DDC9;
    --alert:#A13D3D;
    --alert-light:#F3DCDA;
    --line:#CBCFC1;
    --radius:16px;
    --font-display: ui-rounded, 'Segoe UI', -apple-system, system-ui, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);}
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  @media (prefers-reduced-motion:no-preference){
    .animate{ transition: all .18s ease; }
  }

  /* ---------- Top bar ---------- */
  header.topbar{
    padding:22px 20px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  header.topbar .brand{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    letter-spacing:-0.01em;
  }
  header.topbar .brand span{color:var(--gold);}
  header.topbar .week-label{
    font-size:13px;
    color:var(--slate);
    font-weight:500;
  }

  main{
    flex:1;
    padding:0 16px 100px;
    overflow-y:auto;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }
  .card h2{
    font-family:var(--font-display);
    font-size:15px;
    font-weight:600;
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2 .step{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;height:20px;
    border-radius:6px;
    background:var(--paper-2);
    font-family:var(--font-mono);
    font-size:11px;
    font-weight:700;
    color:var(--slate);
  }
  .subtext{color:var(--slate); font-size:13px; line-height:1.5; margin:0 0 12px;}

  /* ---------- Hero (Home) ---------- */
  .hero{
    background:var(--ink);
    color:var(--paper);
    border-radius:20px;
    padding:22px 20px 18px;
    margin-bottom:16px;
  }
  .hero .hero-label{
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:#AEB6A6;
    font-weight:600;
  }
  .hero .hero-amount{
    font-family:var(--font-mono);
    font-size:44px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:4px 0 14px;
  }
  .hero .hero-amount.neg{color:#E29A93;}
  .ledger-strip{
    display:flex;
    height:10px;
    border-radius:6px;
    overflow:hidden;
    background:#3A423A;
    margin-bottom:8px;
  }
  .ledger-strip .seg{height:100%;}
  .ledger-strip .seg.bills{background:var(--rust);}
  .ledger-strip .seg.savings{background:var(--moss);}
  .ledger-strip .seg.left{background:var(--gold);}
  .ledger-key{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:11.5px;
    color:#C7CDC0;
  }
  .ledger-key .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
  .ledger-key .bills .dot{background:var(--rust);}
  .ledger-key .savings .dot{background:var(--moss);}
  .ledger-key .left .dot{background:var(--gold);}

  /* ---------- Hours stepper ---------- */
  .stepper-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .stepper-btn{
    width:46px;height:46px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--paper-2);
    font-size:20px;
    font-weight:700;
    color:var(--ink);
    font-family:var(--font-mono);
    cursor:pointer;
  }
  .stepper-btn:active{background:var(--line);}
  .stepper-value{
    flex:1;
    text-align:center;
    font-family:var(--font-mono);
    font-size:26px;
    font-weight:700;
  }
  .stepper-value small{display:block;font-family:var(--font-body);font-weight:500;font-size:11px;color:var(--slate);}
  .chip-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .chip{
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--card);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
  }
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .pay-breakdown{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--slate);
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--line);
  }
  .pay-breakdown b{color:var(--ink); font-family:var(--font-mono);}

  /* ---------- List rows (bills / envelopes) ---------- */
  .row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:none;}
  .check{
    width:24px;height:24px;
    border-radius:8px;
    border:2px solid var(--line);
    background:var(--card);
    flex-shrink:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .check.on{background:var(--moss); border-color:var(--moss);}
  .check.on::after{content:"✓"; color:#fff; font-size:14px; font-weight:700;}
  .row .name{flex:1; font-weight:600; font-size:14.5px;}
  .row .name small{display:block; font-weight:400; color:var(--slate); font-size:11.5px; margin-top:1px;}
  .row .amt-input{
    width:78px;
    text-align:right;
    font-family:var(--font-mono);
    font-size:14.5px;
    font-weight:600;
    border:1px solid var(--line);
    border-radius:8px;
    padding:7px 8px;
    background:#fff;
    color:var(--ink);
  }
  .tag{
    font-size:10px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.03em;
    padding:3px 7px;
    border-radius:6px;
  }
  .tag.fixed{background:var(--moss-light); color:var(--moss);}
  .tag.variable{background:var(--gold-light); color:var(--gold);}

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:14px 18px;
    border-radius:12px;
    border:none;
    font-family:var(--font-body);
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .btn.primary{background:var(--ink); color:var(--paper);}
  .btn.ghost{background:var(--paper-2); color:var(--ink);}
  .btn.danger{background:var(--alert-light); color:var(--alert);}
  .btn.small{width:auto; padding:9px 14px; font-size:13px; border-radius:10px;}

  /* ---------- Envelopes / bill groups ---------- */
  .env-group-title{
    margin:20px 0 8px 4px;
  }
  .egt-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .egt-name{
    display:flex;
    align-items:center;
    gap:6px;
    min-width:0;
    cursor:pointer;
    color:var(--slate);
  }
  .egt-name .gname{
    font-family:var(--font-display);
    font-weight:700;
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:.04em;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .egt-name svg{ flex-shrink:0; width:16px; height:16px; display:block; }
  .env-group-title b{
    color:var(--ink);
    font-family:var(--font-mono);
    font-size:14px;
    font-weight:700;
    text-transform:none;
    letter-spacing:0;
    flex-shrink:0;
    white-space:nowrap;
  }
  .egt-actions{
    display:flex;
    justify-content:flex-end;
    gap:2px;
    margin-top:2px;
  }
  .egt-actions .icon-btn{
    width:26px; height:26px;
    border:none;
    background:none;
  }
  .egt-actions .icon-btn svg{ width:16px; height:16px; display:block; }
  .icon-btn-sm svg{ width:16px; height:16px; display:block; }
  .icon-chev{ display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; }
  .icon-chev svg{ width:16px; height:16px; display:block; }
  .envelope{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:10px;
    overflow:hidden;
  }
  .envelope .flap{
    height:8px;
    background:linear-gradient(120deg, var(--moss), var(--gold));
  }
  .envelope .body{padding:14px 16px;}
  .envelope .top-row{display:flex; justify-content:space-between; align-items:baseline;}
  .envelope .ename{font-weight:700; font-size:14.5px;}
  .envelope .ebal{font-family:var(--font-mono); font-weight:700; font-size:17px;}
  .envelope .etarget{font-size:11.5px; color:var(--slate); margin-top:2px;}
  .envelope .actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
  .envelope .actions .chip{padding:7px 12px; font-size:12.5px;}
  .envelope .actions .chip.minus{color:var(--rust);}

  /* ---------- Bills edit ---------- */
  .bill-edit-row{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
  }
  .bill-edit-row .fields{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .field{display:flex; flex-direction:column; gap:4px; flex:1; min-width:100px;}
  .field label{font-size:11px; color:var(--slate); font-weight:600;}
  .field input, .field select{
    border:1px solid var(--line);
    border-radius:9px;
    padding:9px 10px;
    font-size:14px;
    font-family:var(--font-body);
    background:#fff;
    color:var(--ink);
  }
  .field input[type=number]{font-family:var(--font-mono);}
  .row-top{display:flex; justify-content:space-between; align-items:center;}
  .icon-btn{
    width:34px;height:34px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--slate);
  }
  .icon-btn:disabled{opacity:.3; cursor:default;}

  /* ---------- Drag to reorder ---------- */
  .drag-handle{
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    color:var(--slate);
    cursor:grab;
    touch-action:none;
    flex-shrink:0;
  }
  .drag-handle:active{cursor:grabbing;}
  [data-drag-id].dragging{
    opacity:.9;
    box-shadow:0 10px 26px rgba(0,0,0,.22);
    z-index:20;
    position:relative;
  }

  /* ---------- Nav ---------- */
  nav.tabbar{
    position:sticky;
    bottom:0;
    left:0; right:0;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    max-width:480px;
    margin:0 auto;
    width:100%;
  }
  nav.tabbar button{
    flex:1;
    background:none;
    border:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding:8px 4px;
    border-radius:12px;
    cursor:pointer;
    color:var(--slate);
    font-family:var(--font-body);
    font-size:11px;
    font-weight:600;
  }
  nav.tabbar button.active{color:var(--moss); background:var(--moss-light);}
  nav.tabbar svg{width:22px;height:22px;}

  .empty{
    text-align:center;
    padding:30px 10px;
    color:var(--slate);
    font-size:13.5px;
  }
  .welcome{
    background:var(--gold-light);
    border:1px solid var(--gold);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:14px;
  }
  .welcome h2{color:var(--gold); margin-bottom:6px;}
  .welcome p{font-size:13.5px; line-height:1.55; margin:0 0 10px; color:#5C4A22;}
  .welcome ol{margin:0 0 12px; padding-left:18px; font-size:13.5px; color:#5C4A22; line-height:1.7;}
  .toast{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:var(--paper);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    opacity:0;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{opacity:1; animation:toastpop .18s ease;}
  @keyframes toastpop{from{transform:translateX(-50%) translateY(6px); opacity:0;} to{transform:translateX(-50%) translateY(0); opacity:1;}}

  .history-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:13.5px;}
  .history-row:last-child{border-bottom:none;}
  .history-row .d{color:var(--slate); font-size:11.5px;}
  .history-row .amt{font-family:var(--font-mono); font-weight:700;}
  .history-row .amt.neg{color:var(--alert);}
  .history-row .amt.pos{color:var(--moss);}

  .pay-input{
    width:100%;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 14px;
    font-size:26px;
    font-weight:700;
    font-family:var(--font-mono);
    background:#fff;
    color:var(--ink);
  }
  .settings-label{font-size:13px; font-weight:600; margin-bottom:6px; display:block;}
  .settings-row{margin-bottom:16px;}
  .settings-row input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    font-family:var(--font-mono);
    background:#fff;
  }
  .help-text{font-size:12px; color:var(--slate); margin-top:5px; line-height:1.5;}

  /* ---------- In-app modal (replaces unreliable browser confirm/prompt) ---------- */
  .modal-backdrop{
    position:fixed; inset:0;
    background:rgba(35,42,36,.55);
    display:flex; align-items:center; justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-card{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    width:100%;
    max-width:400px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .modal-message{font-size:15px; line-height:1.5; margin:0 0 14px; font-weight:600;}
  .modal-input{
    width:100%;
    border:1px solid var(--line);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    font-family:var(--font-body);
    margin-bottom:14px;
    background:#fff;
    color:var(--ink);
  }
  .modal-actions{display:flex; gap:10px;}
  .modal-actions .btn{width:auto; flex:1;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">Pocket <span>Ledger</span></div>
    <div class="week-label" id="weekLabel"></div>
  </header>
  <main id="view"></main>
  <div class="toast" id="toast"></div>
  <div id="modalRoot"></div>
  <nav class="tabbar" id="tabbar"></nav>
</div>

<script>
/* ============================================================
   POCKET LEDGER — a phone-friendly weekly budget + savings-envelope
   tool. All data is autosaved on-device (localStorage) as it changes —
   nothing is ever sent over the network.
   ============================================================ */

const ICONS = {
  home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>',
  env:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 6 9 7 9-7"/></svg>',
  bills:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>',
  gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>',
  up:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>',
  down: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
  grip: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>'
};

const DEFAULT_DATA = {
  profile: { hourlyRate: 23.10, deductionRate: 0.373, name: "Ben" },
  bills: [
    { id:'rent', name:'Rent', amount:796, day:'1st', type:'fixed' },
    { id:'car_payment', name:'Car Payment', amount:190, day:'13th', type:'fixed' },
    { id:'car_ins', name:'Car Insurance', amount:165, day:'9th', type:'fixed' },
    { id:'renters_ins', name:"Renter's Insurance", amount:17, day:'Nov (annual)', type:'fixed' },
    { id:'electric', name:'Electric', amount:145, day:'15th', type:'variable' },
    { id:'internet', name:'Internet', amount:98, day:'15th', type:'fixed' },
    { id:'phone', name:'Phone', amount:35, day:'15th', type:'fixed' },
    { id:'fuel', name:'Fuel', amount:65, day:'—', type:'variable' },
    { id:'food', name:'Food', amount:563, day:'—', type:'variable' },
    { id:'clothes', name:'Clothes', amount:20, day:'—', type:'variable' },
    { id:'car_maint', name:'Car Reg, Maint & Tires', amount:110, day:'—', type:'fixed' },
    { id:'credit_card', name:'Credit Card', amount:40, day:'8th', type:'variable' },
    { id:'subscriptions', name:'Subscriptions', amount:39, day:'1st/6th/11th', type:'fixed' },
    { id:'gaming', name:'Gaming / Discretionary', amount:0, day:'—', type:'variable' }
  ],
  envelopes: [

function esc(s){ return String(s).replace(/"/g, '&quot;'); }

function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmt(n){
  const neg = n < 0;
  const v = Math.abs(Math.round(n*100)/100).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
  return (neg?'-$':'$') + v;
}
function fmtWhole(n){ return '$' + Math.round(n).toLocaleString('en-US'); }
function weeklyFromMonthly(m){ return m * 12 / 52; }
const CADENCE_PERIODS_PER_YEAR = { weekly:52, monthly:12, quarterly:4, semiannual:2, annual:1 };
const CADENCE_LABELS = { weekly:'wk', monthly:'mo', quarterly:'qtr', semiannual:'6mo', annual:'yr' };
function weeklyFromBill(b){
  const periods = CADENCE_PERIODS_PER_YEAR[b.cadence || 'monthly'] || 12;
  return b.amount * periods / 52;
}
function logEnvelope(env, action, amount){
  DATA.envelopeLog = DATA.envelopeLog || [];
  DATA.envelopeLog.unshift({ ts: new Date().toISOString(), envId: env.id, envName: env.name, action, amount, balanceAfter: env.balance });
  DATA.envelopeLog = DATA.envelopeLog.slice(0, 200);
}
/* General transaction ledger — pay, misc income, and bills. Envelope
   activity keeps living in envelopeLog above; the two are merged for
   display in the Transaction History card. Amount sign: positive = money
   in, negative = money out. */
function logTransaction(category, label, amount, refId){
  DATA.transactions = DATA.transactions || [];
  DATA.transactions.unshift({ ts: new Date().toISOString(), category, label, amount, weekStart: DATA.week.startDate, refId });
  DATA.transactions = DATA.transactions.slice(0, 300);
}
/* Used for entries that should have at most one live row per week per
   label (pay, a given bill) — editing updates the existing row instead of
   stacking duplicates; setting amount to 0 removes the row. */
function upsertWeekTransaction(category, label, amount){
  DATA.transactions = DATA.transactions || [];
  const existing = DATA.transactions.find(t=>t.category===category && t.label===label && t.weekStart===DATA.week.startDate);
  if(!amount){
    if(existing) DATA.transactions = DATA.transactions.filter(t=>t!==existing);
    return;
  }
  if(existing){
    existing.amount = amount;
    existing.ts = new Date().toISOString();
  } else {
    DATA.transactions.unshift({ ts: new Date().toISOString(), category, label, amount, weekStart: DATA.week.startDate });
  }
  DATA.transactions = DATA.transactions.slice(0, 300);
}
function getAllTransactions(){
  const tx = (DATA.transactions||[]).map(t=>({ ts:t.ts, category:t.category, label:t.label, amount:t.amount }));
  const envTx = (DATA.envelopeLog||[]).map(l=>({ ts:l.ts, category:'Envelope', label: l.envName+' — '+l.action, amount:l.amount }));
  return [...tx, ...envTx].sort((a,b)=> new Date(b.ts) - new Date(a.ts));
}
/* Auto-trims transaction/envelope history older than the retention
   window (0 = keep forever). Runs once on load, and again whenever the
   retention setting changes. This is separate from the weekly "History"
   summary and envelope balances, which are never pruned. */
function pruneTransactionHistory(){
  const days = DATA.historyRetentionDays;
  if(!days || days<=0) return;
  const cutoff = Date.now() - days*24*60*60*1000;
  DATA.transactions = (DATA.transactions||[]).filter(t=> new Date(t.ts).getTime() >= cutoff);
  DATA.envelopeLog = (DATA.envelopeLog||[]).filter(l=> new Date(l.ts).getTime() >= cutoff);
}
function groupTransactionsByDay(list){
  const groups = [];
  const byKey = {};
  list.forEach(t=>{
    const d = new Date(t.ts);
    const key = d.toISOString().slice(0,10);
    if(!byKey[key]){
      byKey[key] = { key, dateLabel: d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'}), items:[], net:0 };
      groups.push(byKey[key]);
    }
    byKey[key].items.push(t);
    byKey[key].net += t.amount;
  });
  return groups;
}
let TX_COLLAPSE = {};
function toggleTxDay(key){
  TX_COLLAPSE[key] = !TX_COLLAPSE[key];
  render();
}

/* ---------------- Storage ----------------
   Everything is saved with localStorage, which keeps data only on THIS
   device, in THIS browser/app instance — nothing is sent anywhere, no
   account or internet connection required. This is what makes the app
   safe to install and use fully offline. */
const STORAGE_KEY = 'pocket-ledger-data-v1';
async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      DATA = Object.assign({}, DEFAULT_DATA, parsed);
    } else {
      DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e){
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  pruneTransactionHistory();
  (DATA.bills||[]).forEach(b=>{ if(!b.group) b.group = 'General'; });
  if(!DATA.billGroupOrder || !DATA.billGroupOrder.length) DATA.billGroupOrder = ['General'];
}
function saveData(showToast){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
      if(showToast) flashToast('Saved');
    }catch(e){ console.error('Storage error', e); flashToast('Could not save — storage may be full or blocked'); }
  }, 200);
}
function flashToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1400);
}

/* ---------------- Derived calculations ---------------- */
function miscIncomeTotal(){
  return (DATA.week.miscIncome||[]).reduce((s,m)=> s + (m.amount||0), 0);
}
function netPay(){
  return (DATA.week.payAmount||0) + miscIncomeTotal();
}
function billsAllocatedTotal(){
  let sum = 0;
  DATA.bills.forEach(b=>{
    if(DATA.week.billsChecked[b.id]){
      const amt = (DATA.week.billOverride[b.id] !== undefined) ? DATA.week.billOverride[b.id] : weeklyFromBill(b);
      sum += amt;
    }
  });
  return sum;
}
function savingsAllocatedTotal(){
  let sum = 0;
  Object.values(DATA.week.envDeposits).forEach(v=> sum += v);
  return sum;
}
function leftToSpend(){
  return netPay() - billsAllocatedTotal() - savingsAllocatedTotal();
}

let HOME_ENV_DRAFT = {};
function addToPickedEnvelope(){
  const sel = document.getElementById('homeEnvPicker');
  const amtInput = document.getElementById('homeEnvPickerAmt');
  const envId = sel ? sel.value : null;
  const n = amtInput ? parseFloat(amtInput.value) : NaN;
  if(!envId){ flashToast('Pick an envelope first'); return; }
  if(isNaN(n) || n<=0){ flashToast('Enter an amount first'); return; }
  quickDeposit(envId, n);
}
function dismissOnboarding(){ DATA.onboardingSeen = true; saveData(); render(); }
let HOME_BILL_EXPANDED = {};
function expandHomeBill(id){ HOME_BILL_EXPANDED[id] = true; render(); }
function collapseHomeBill(id){ HOME_BILL_EXPANDED[id] = false; render(); }
function setPayAmount(val){
  const n = parseFloat(val);
  DATA.week.payAmount = isNaN(n) ? 0 : n;
  upsertWeekTransaction('Pay', 'Weekly pay', DATA.week.payAmount);
  saveData(); render();
}
function addMiscIncome(){
  const labelInput = document.getElementById('miscLabelInput');
  const amtInput = document.getElementById('miscAmountInput');
  const label = labelInput ? labelInput.value.trim() : '';
  const amount = amtInput ? parseFloat(amtInput.value) : NaN;
  if(isNaN(amount) || amount<=0){ flashToast('Enter an amount first'); return; }
  const item = { id:'mi_'+Date.now(), label: label || 'Misc income', amount };
  DATA.week.miscIncome = DATA.week.miscIncome || [];
  DATA.week.miscIncome.push(item);
  logTransaction('Misc income', item.label, item.amount, item.id);
  saveData(); render();
  flashToast('Added '+fmtWhole(amount));
}
function removeMiscIncome(idx){
  const list = DATA.week.miscIncome || [];
  const item = list[idx];
  if(!item) return;
  list.splice(idx,1);
  DATA.transactions = (DATA.transactions||[]).filter(t=>t.refId !== item.id);
  saveData(); render();
}
function toggleBill(id){
  DATA.week.billsChecked[id] = !DATA.week.billsChecked[id];
  const b = DATA.bills.find(x=>x.id===id);
  if(b){
    if(DATA.week.billsChecked[id]){
      const amt = (DATA.week.billOverride[id]!==undefined) ? DATA.week.billOverride[id] : weeklyFromBill(b);
      upsertWeekTransaction('Bill', b.name, -amt);
    } else {
      upsertWeekTransaction('Bill', b.name, 0);
    }
  }
  saveData(); render();
}
function setBillOverride(id, val){
  const n = parseFloat(val);
  if(!isNaN(n)) DATA.week.billOverride[id] = n;
  const b = DATA.bills.find(x=>x.id===id);
  if(b && DATA.week.billsChecked[id]){
    const amt = (DATA.week.billOverride[id]!==undefined) ? DATA.week.billOverride[id] : weeklyFromBill(b);
    upsertWeekTransaction('Bill', b.name, -amt);
  }
  saveData(); render();
}
function addEnvAmount(envId){
  const input = document.getElementById('envAmt_'+envId);
  const n = input ? parseFloat(input.value) : NaN;
  if(isNaN(n) || n<=0){ flashToast('Enter an amount first'); return; }
  quickDeposit(envId, n);
  delete HOME_ENV_DRAFT[envId];
}
function quickDeposit(envId, amount){
  const env = DATA.envelopes.find(e=>e.id===envId);
  if(!env) return;
  env.balance += amount;
  DATA.week.envDeposits[envId] = (DATA.week.envDeposits[envId]||0) + amount;

function undoDeposit(envId, amount){

function finishWeek(){
  const summary = {
    startDate: DATA.week.startDate,
    pay: DATA.week.payAmount || 0,
    misc: miscIncomeTotal(),
    net: netPay(),
    bills: billsAllocatedTotal(),
    saved: savingsAllocatedTotal(),
    left: leftToSpend()
  };
  DATA.history.unshift(summary);
  DATA.history = DATA.history.slice(0, 52);
  DATA.envelopes.forEach(e=>{
    if(e.monthlyTarget > 0){
      const weeklyTarget = weeklyFromMonthly(e.monthlyTarget);
      const actual = DATA.week.envDeposits[e.id] || 0;
      const shortfall = weeklyTarget - actual;
      e.catchUpBalance = (e.catchUpBalance || 0) + shortfall;
    }
  });
  DATA.bills.forEach(b=>{
    const weeklyTarget = weeklyFromBill(b);
    const weeklyAmt = (DATA.week.billOverride[b.id] !== undefined) ? DATA.week.billOverride[b.id] : weeklyTarget;
    const actual = DATA.week.billsChecked[b.id] ? weeklyAmt : 0;
    const shortfall = weeklyTarget - actual;
    b.catchUpBalance = (b.catchUpBalance || 0) + shortfall;
  });
  DATA.week = { startDate: todayISO(), payAmount:0, miscIncome:[], billsChecked:{}, billOverride:{}, envDeposits:{} };

/* Weekly-equivalent amount converted into whichever unit the person wants
   to view totals in (weekly/monthly/annual) — display only, storage always
   stays weekly-equivalent internally. */
function convertFromWeekly(weeklyAmt, mode){
  if(mode==='monthly') return weeklyAmt * 52/12;
  if(mode==='annual') return weeklyAmt * 52;
  return weeklyAmt;

/* ---------------- Drag to reorder (bills, envelopes-within-group) ---------------- */
let DRAG = null;
function dragStart(evt, id, scope){
  evt.preventDefault();
  const item = evt.currentTarget.closest('[data-drag-id]');
  if(!item) return;
  const container = item.parentElement;
  const siblingEls = Array.from(container.querySelectorAll(`[data-drag-scope="${scope}"]`));
  const siblings = siblingEls.map(el=>({ id: el.getAttribute('data-drag-id'), rect: el.getBoundingClientRect() }));
  DRAG = {
    id, scope, item,
    startY: evt.clientY,
    siblings,
    currentIndex: siblings.findIndex(s=>s.id===id)
  };
  item.classList.add('dragging');
  document.addEventListener('pointermove', dragMove);
  document.addEventListener('pointerup', dragEnd);
}
function dragMove(evt){
  if(!DRAG) return;
  const deltaY = evt.clientY - DRAG.startY;
  DRAG.item.style.transform = `translateY(${deltaY}px)`;
}
function dragEnd(evt){
  if(!DRAG) return;
  const deltaY = evt.clientY - DRAG.startY;
  document.removeEventListener('pointermove', dragMove);
  document.removeEventListener('pointerup', dragEnd);
  DRAG.item.style.transform = '';
  DRAG.item.classList.remove('dragging');

  const dragged = DRAG.siblings[DRAG.currentIndex];
  const newCenterY = dragged.rect.top + dragged.rect.height/2 + deltaY;
  let newIndex = 0;
  DRAG.siblings.forEach((s,i)=>{
    if(i===DRAG.currentIndex) return;
    if(s.rect.top + s.rect.height/2 < newCenterY) newIndex++;
  });
  commitReorder(DRAG.scope, DRAG.id, newIndex);
  DRAG = null;
}
function reorderArrayWithinGroup(arr, groupField, groupName, id, newIndex){
  const sameGroupIdxs = arr.map((e,i)=>({e,i})).filter(x=>(x.e[groupField]||'General')===groupName).map(x=>x.i);
  const posInGroup = sameGroupIdxs.findIndex(i=>arr[i].id===id);
  if(posInGroup<0 || posInGroup===newIndex) return false;
  const actualOldIdx = sameGroupIdxs[posInGroup];
  const [item] = arr.splice(actualOldIdx,1);
  const newSameGroupIdxs = arr.map((e,i)=>({e,i})).filter(x=>(x.e[groupField]||'General')===groupName).map(x=>x.i);
  const insertAt = newIndex >= newSameGroupIdxs.length
    ? (newSameGroupIdxs.length ? newSameGroupIdxs[newSameGroupIdxs.length-1]+1 : arr.length)
    : newSameGroupIdxs[newIndex];
  arr.splice(insertAt,0,item);
  return true;
}
function commitReorder(scope, id, newIndex){
  if(scope === 'bills'){
    const oldIndex = DATA.bills.findIndex(b=>b.id===id);
    if(oldIndex<0 || oldIndex===newIndex){ render(); return; }
    const [item] = DATA.bills.splice(oldIndex,1);
    DATA.bills.splice(newIndex,0,item);
    saveData(); render();
  } else if(scope.indexOf('billgroup:')===0){
    const groupName = scope.slice(10);
    if(reorderArrayWithinGroup(DATA.bills, 'group', groupName, id, newIndex)) saveData();
    render();
  } else if(scope.indexOf('group:')===0){
    const groupName = scope.slice(6);
    if(reorderArrayWithinGroup(DATA.envelopes, 'group', groupName, id, newIndex)) saveData();
    render();
  } else {
    render();
  }
}
function moveGroup(name, direction){
  const groups = getOrderedGroups();
  const idx = groups.indexOf(name);
  const swapIdx = idx + direction;
  if(swapIdx<0 || swapIdx>=groups.length) return;
  [groups[idx], groups[swapIdx]] = [groups[swapIdx], groups[idx]];
  DATA.groupOrder = groups;
  saveData(); render();
}
function renameGroup(oldName){
  showPrompt('Rename "'+oldName+'" to:', oldName, (newName)=>{
    if(!newName || !newName.trim() || newName.trim()===oldName) return;
    const trimmed = newName.trim();
    const merging = DATA.envelopes.some(e=>e.group===trimmed);
    const doRename = ()=>{
      DATA.envelopes.forEach(e=>{ if(e.group===oldName) e.group = trimmed; });
      DATA.groupBankBalances = DATA.groupBankBalances || {};
      if(DATA.groupBankBalances[oldName] !== undefined){
        if(DATA.groupBankBalances[trimmed] === undefined){
          DATA.groupBankBalances[trimmed] = DATA.groupBankBalances[oldName];
        }
        delete DATA.groupBankBalances[oldName];
      }
      DATA.groupOrder = (DATA.groupOrder||[]).map(g=> g===oldName ? trimmed : g)
        .filter((g,i,arr)=>arr.indexOf(g)===i);
      saveData(); render();
      flashToast('Renamed to '+trimmed);
    };
    if(merging){
      showConfirm('"'+trimmed+'" already exists — this will combine both into one group. Continue?', doRename);
    } else {
      doRename();
    }
  });
}
function editEnvelope(id, field, value){
  const e = DATA.envelopes.find(x=>x.id===id);

  e[field] = (field==='monthlyTarget') ? (parseFloat(value)||0) : value;

function handleGroupChange(id, value){

      DATA.bills.forEach(b=>{ if((b.group||'General')===oldName) b.group = trimmed; });
      DATA.billGroupOrder = (DATA.billGroupOrder||[]).map(g=> g===oldName ? trimmed : g)
        .filter((g,i,arr)=>arr.indexOf(g)===i);
      saveData(); render();
      flashToast('Renamed to '+trimmed);
    };
    if(merging){
      showConfirm('"'+trimmed+'" already exists — this will combine both into one group. Continue?', doRename);
    } else {
      doRename();
    }
  });
}
function moveBillGroup(name, direction){
  const groups = getOrderedBillGroups();
  const idx = groups.indexOf(name);
  const swapIdx = idx + direction;
  if(swapIdx<0 || swapIdx>=groups.length) return;
  [groups[idx], groups[swapIdx]] = [groups[swapIdx], groups[idx]];
  DATA.billGroupOrder = groups;
  saveData(); render();
}
function editBill(id, field, value){
  const b = DATA.bills.find(x=>x.id===id);
  if(!b) return;
  b[field] = (field==='amount') ? (parseFloat(value)||0) : value;
  saveData(); render();
}
function removeBill(id){
  showConfirm('Remove this bill?', ()=>{
    DATA.bills = DATA.bills.filter(b=>b.id!==id);
    saveData(); render();
  });
}
function addBill(){
  const id = 'b_'+Date.now();
  const group = (DATA.billGroupOrder && DATA.billGroupOrder[0]) || 'General';
  DATA.bills.push({id, name:'New bill', amount:0, day:'—', type:'variable', group});
  saveData(); render();
}

/* ---------------- SETTINGS ---------------- */
function renderSettings(){
  const hist = DATA.history;
  const allTx = getAllTransactions();
  const txGroups = groupTransactionsByDay(allTx);
  return `
    <div class="card">
      <h2>Week history</h2>
      ${hist.length===0? '<div class="empty">No finished weeks yet — tap "Finish week" on the Home tab once you\'ve logged one.</div>' :
        hist.map(h=>`
          <div class="history-row">
            <div>
              <div>${new Date(h.startDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
              <div class="d">${fmtWhole(h.pay||h.net||0)} pay${h.misc ? ' + '+fmtWhole(h.misc)+' misc' : ''} · ${fmtWhole(h.bills)} bills · ${fmtWhole(h.saved)} saved</div>
            </div>
            <div class="amt ${h.left<0?'neg':'pos'}">${fmt(h.left)}</div>
          </div>
        `).join('')
      }
    </div>

    <div class="card">
      <h2>Transaction history</h2>
      <p class="subtext">Every dollar in and out — pay, misc income, bills marked paid, and envelope activity — grouped by day, newest first. Tap a day to expand or collapse it.</p>
      ${txGroups.length===0 ? '<div class="empty">No transactions yet.</div>' :
        txGroups.map((g,idx)=>{
          const open = TX_COLLAPSE[g.key]===undefined ? idx===0 : !TX_COLLAPSE[g.key];
          return `
          <div style="border-bottom:1px solid var(--line);">
            <div class="row-top" style="padding:10px 0; cursor:pointer;" onclick="toggleTxDay('${g.key}')">
              <span style="font-weight:700; font-size:13.5px;">${g.dateLabel}</span>
              <span style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:11.5px; color:var(--slate);">${g.items.length} item${g.items.length===1?'':'s'}</span>
                <span class="amt ${g.net<0?'neg':'pos'}" style="font-size:13.5px;">${g.net<0?'-':'+'}${fmtWhole(Math.abs(g.net))}</span>
                <span class="icon-chev" style="color:var(--slate);">${open?ICONS.up:ICONS.down}</span>
              </span>
            </div>
            ${open ? g.items.map(t=>`
              <div class="history-row">
                <div>
                  <div>${t.label}</div>
                  <div class="d">${new Date(t.ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} · ${t.category}</div>
                </div>
                <div class="amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'-':'+'}${fmtWhole(Math.abs(t.amount))}</div>
              </div>
            `).join('') : ''}
          </div>
        `;}).join('')
      }
      <div class="settings-row" style="margin-top:16px; margin-bottom:0;">
        <span class="settings-label">Keep transaction history for</span>
        <select onchange="setRetention(this.value)">
          <option value="30" ${DATA.historyRetentionDays===30?'selected':''}>30 days</option>
          <option value="60" ${DATA.historyRetentionDays===60?'selected':''}>60 days</option>
          <option value="90" ${DATA.historyRetentionDays===90?'selected':''}>90 days</option>
          <option value="180" ${DATA.historyRetentionDays===180?'selected':''}>180 days</option>
          <option value="365" ${DATA.historyRetentionDays===365?'selected':''}>1 year</option>
          <option value="0" ${DATA.historyRetentionDays===0?'selected':''}>Forever</option>
        </select>
        <div class="help-text">Entries older than this are dropped automatically. This never affects envelope balances, bill/envelope settings, or the Week history summary above — only this itemized log.</div>
      </div>
      <button class="btn ghost small" style="margin-top:12px;" onclick="clearTransactionHistory()">Clear transaction history now</button>
    </div>

    <div class="card">
      <h2>Sync phone &amp; PC</h2>
      <p class="subtext">No internet involved — this just turns your data into a short code you copy from one device and paste into the other. Whichever code you load becomes the new copy on that device, so load the newest one.</p>
      <button class="btn ghost small" onclick="showExportCode()">Get code from this device</button>
      <textarea id="exportBox" readonly style="display:none; width:100%; margin-top:10px; font-family:var(--font-mono); font-size:11px; border-radius:10px; border:1px solid var(--line); padding:10px; height:64px; color:var(--ink);"></textarea>
      <div style="height:16px"></div>
      <span class="settings-label">Paste a code from another device</span>
      <textarea id="importBox" placeholder="Paste code here" style="width:100%; font-family:var(--font-mono); font-size:11px; border-radius:10px; border:1px solid var(--line); padding:10px; height:64px; color:var(--ink);"></textarea>
      <button class="btn primary small" style="margin-top:10px" onclick="doImport()">Load this code</button>
    </div>

    <div class="card">
      <h2>Backup</h2>
      <p class="subtext">A sync code only helps if the OTHER device still exists. This sends a copy somewhere safe, in case a phone is ever lost, stolen, or breaks before it can be synced.</p>
      <button class="btn ghost small" onclick="emailBackup()">Email this code to yourself</button>
      <div class="help-text" style="margin-top:10px">${DATA.lastExportAt ? 'Last backup: '+new Date(DATA.lastExportAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'No backup made yet — worth doing once envelope balances start adding up.'}</div>
    </div>

    <div class="card">
      <h2>Start over</h2>
      <p class="subtext">This clears every bill, envelope, and week of history and cannot be undone.</p>
      <button class="btn danger" onclick="resetAll()">Reset all data</button>
    </div>
  `;
}
function resetAll(){
  showConfirm('This clears everything and cannot be undone. Continue?', ()=>{
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); render();
  });
}
function setRetention(val){
  DATA.historyRetentionDays = parseInt(val,10) || 0;
  pruneTransactionHistory();
  saveData(); render();
  flashToast(DATA.historyRetentionDays ? 'Will keep '+DATA.historyRetentionDays+' days of history' : 'Keeping history forever');
}
function clearTransactionHistory(){
  showConfirm('Clear all itemized transaction history? Envelope balances, bills, and week history stay untouched — this only clears the log.', ()=>{
    DATA.transactions = [];
    DATA.envelopeLog = [];
    saveData(); render();
    flashToast('Transaction history cleared');
  });
}

/* ---------------- Sync (copy/paste code, no network) ---------------- */
function exportCode(){
  DATA.lastExportAt = new Date().toISOString();
  const json = JSON.stringify(DATA);
  saveData();
  return btoa(unescape(encodeURIComponent(json)));
}
function showExportCode(){
  const box = document.getElementById('exportBox');
  box.style.display = 'block';
  box.value = exportCode();
  box.focus();
  box.select();
  try{
    document.execCommand('copy');
    flashToast('Code copied — paste it on the other device');
  }catch(e){
    flashToast('Code ready below — copy it manually');
  }
}
function doImport(){
  const raw = document.getElementById('importBox').value.trim();
  if(!raw){ flashToast('Paste a code first'); return; }
  let parsed = null;
  try{
    const json = decodeURIComponent(escape(atob(raw)));
    parsed = JSON.parse(json);
  }catch(e){ parsed = null; }
  if(!parsed || !parsed.bills){ flashToast("That code didn't work — make sure it was copied in full"); return; }
  showConfirm('This replaces everything on this device with the pasted data. Continue?', ()=>{
    DATA = Object.assign({}, DEFAULT_DATA, parsed);
    saveData();
    render();
    flashToast('Synced!');
  });
}
function emailBackup(){
  const code = exportCode();
  const subject = encodeURIComponent('Pocket Ledger backup — ' + new Date().toLocaleDateString());
  const body = encodeURIComponent(
    "This is a backup code from Pocket Ledger. To restore it, open the app, go to Settings, "
    + "paste this whole code into \"Paste a code from another device,\" and tap \"Load this code.\"\n\n"
    + code
  );
  window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
  render();
}

/* ---------------- Boot ---------------- */
(async function init(){
  await loadData();
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
